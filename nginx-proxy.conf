# Configuração de referência do proxy reverso Nginx
# Uso: desenvolvimento local (localhost) com Nginx + proxy reverso
#
# Para GitHub Pages / produção pública:
#   → use o Cloudflare Worker em worker/cors-proxy.js
#   → npx wrangler deploy (gratuito, 100k req/dia)
#
# Fluxo local: O app (api.js) detecta localhost e usa /api/* como base.
# O Nginx encaminha /api/* → https://webapp1-riodasostras.cidade360.cloud/dadosabertos/*
# CORS headers adicionados para permitir acesso sem restrições.
server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # ── CORS: permite acesso de qualquer origem (GitHub Pages, etc.) ──
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept, Content-Type" always;

    # Preflight (OPTIONS) responde 204 sem proxy
    if ($request_method = OPTIONS) {
        return 204;
    }

    location /api/ {
        proxy_pass https://webapp1-riodasostras.cidade360.cloud/dadosabertos/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host webapp1-riodasostras.cidade360.cloud;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
