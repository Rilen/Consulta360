# Configuração de referência do proxy reverso Nginx
# Este arquivo é injetado automaticamente pelo CI/CD (ci-cd.yaml)
# durante o deploy no container nginx-homologacao.
#
# Fluxo: O app (api.js) detecta rede interna e usa /api/* como base.
# O Nginx encaminha /api/* → https://webapp1-riodasostras.cidade360.cloud/dadosabertos/*
# CORS headers adicionados para permitir acesso de origens externas (ex: GitHub Pages).
# Resultado: sem erro de CORS, dados reais do Portal da Transparência.
server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # ── CORS: permite acesso de qualquer origem (GitHub Pages, etc.) ──
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept, Content-Type" always;

    # Preflight (OPTIONS) responde 204 sem proxy
    if ($request_method = OPTIONS) {
        return 204;
    }

    location /api/ {
        proxy_pass https://webapp1-riodasostras.cidade360.cloud/dadosabertos/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host webapp1-riodasostras.cidade360.cloud;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
