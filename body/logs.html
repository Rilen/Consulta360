<div class="space-y-6 fade-in max-w-6xl mx-auto">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 shadow-inner">
                <i class="bi bi-shield-lock w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Trilha de Auditoria (Logs)</h1>
                <p class="text-sm text-slate-500">Histórico colaborativo de acesso à rede Consulta360</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <input type="text" id="filtroLogs" placeholder="Buscar por nome..." class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20 w-64 shadow-sm">
            <button id="btnRecarregarLogs" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 active:scale-95 transition-all shadow-sm">
                <i class="bi bi-arrow-clockwise"></i> Recarregar
            </button>
        </div>
    </div>

    <!-- Métricas (Analytics) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <!-- Acessos Hoje -->
        <div class="kpi-card p-5 border-accent flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center">
                <i class="bi bi-calendar-check text-blue-600 text-xl"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Acessos Hoje</p>
                <h3 class="text-2xl font-black text-slate-800 mt-1" id="metricAcessosHoje">--</h3>
            </div>
        </div>
        <!-- Cargo Frequente -->
        <div class="kpi-card p-5 border-accent flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center">
                <i class="bi bi-person-badge text-indigo-600 text-xl"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Cargo Frequente</p>
                <h3 class="text-xl font-bold text-slate-800 mt-1" id="metricCargoFreq">--</h3>
            </div>
        </div>
        <!-- Pico de Acesso -->
        <div class="kpi-card p-5 border-accent flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center">
                <i class="bi bi-clock-history text-emerald-600 text-xl"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Pico de Movimento</p>
                <h3 class="text-xl font-bold text-slate-800 mt-1" id="metricPicoHora">--</h3>
            </div>
        </div>
    </div>

    <!-- Tabela de Logs -->
    <div class="ag-card p-6 border-accent relative overflow-hidden">
        <div class="absolute right-0 top-0 w-32 h-32 bg-slate-500/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
        
        <div class="overflow-x-auto relative z-10">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-slate-200">
                        <th class="py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Usuário</th>
                        <th class="py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Nível de Acesso</th>
                        <th class="py-3 px-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Data e Hora</th>
                    </tr>
                </thead>
                <tbody id="tabelaLogs" class="text-sm">
                    <tr>
                        <td colspan="3" class="py-8 text-center text-slate-400">
                            <i class="bi bi-hourglass-split w-6 h-6 animate-pulse block mx-auto mb-2"></i>
                            Buscando registros na rede...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
