name: Deploy Homologacao

on:
  push:
    branches: [ main ]

jobs:
  deploy-homologacao:
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine
    
    steps:
      # Checkout simplificado usando a action oficial (mais seguro e testado)
      - name: Checkout do Codigo
        uses: actions/checkout@v4
        
      - name: Instalar Cliente Docker
        run: |
          apk add --no-cache docker-cli
          
      - name: Injetar Arquivos Direto no Nginx Central via Docker
        run: |
          # No Gitea, usamos a variavel github.repository para compatibilidade
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2 | tr 'A-Z' 'a-z')
          ORIGINAL_REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          
          echo "🐳 Verificando qual container está usando a porta 3005..."
          CENTRAL_CONTAINER=$(docker ps --format '{{.Names}} {{.Ports}}' | grep "3005->" | awk '{print $1}')
          
          if [ -z "$CENTRAL_CONTAINER" ]; then
            echo "⚠️ Nenhum container encontrado na porta 3005. Criando novo nginx-homologacao..."
            docker run -d --name nginx-homologacao --restart unless-stopped -p 3005:80 nginx:alpine
            CENTRAL_CONTAINER="nginx-homologacao"
          else
            echo "✅ Container central encontrado: $CENTRAL_CONTAINER"
          fi
          
          echo "🐳 Injetando arquivos estáticos dentro do container central $CENTRAL_CONTAINER..."
          
          # OBS: O runner precisa ter permissao ao socket docker do host
          docker exec $CENTRAL_CONTAINER mkdir -p /usr/share/nginx/html/$REPO_NAME
          docker exec $CENTRAL_CONTAINER sh -c "rm -rf /usr/share/nginx/html/$REPO_NAME/*"
          
          # Como é um projeto HTML estático, copiamos do diretório atual (.) em vez de (out/.)
          docker cp . $CENTRAL_CONTAINER:/usr/share/nginx/html/$REPO_NAME/
          
          # Habilitar WebDAV para a pasta /data/ (Cache Colaborativo)
          echo 'server {
              listen 80;
              server_name localhost;
              location / {
                  root /usr/share/nginx/html;
                  index index.html index.htm;
              }
              
              # Proxy Reverso para a API Backend (Python FastAPI)
              location /api/ {
                  proxy_pass http://10.0.0.88:8080/api/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }

              location ~ ^/([^/]+)/data/ {
                  root /usr/share/nginx/html;
                  dav_methods PUT DELETE;
                  create_full_put_path on;
                  dav_access user:rw group:rw all:rw;
                  client_max_body_size 50M;
              }
          }' > default.conf
          docker cp default.conf $CENTRAL_CONTAINER:/etc/nginx/conf.d/default.conf
          docker exec $CENTRAL_CONTAINER mkdir -p /usr/share/nginx/html/$REPO_NAME/data
          docker exec $CENTRAL_CONTAINER chown -R nginx:nginx /usr/share/nginx/html
          docker exec $CENTRAL_CONTAINER nginx -s reload

          
          if [ "$ORIGINAL_REPO_NAME" != "$REPO_NAME" ]; then
            echo "🔄 Criando página de redirecionamento para o caso original ($ORIGINAL_REPO_NAME -> $REPO_NAME)..."
            mkdir -p redirect
            echo "<html><head><meta http-equiv=\"refresh\" content=\"0;url=/${REPO_NAME}/\" /><script>window.location.replace(\"/${REPO_NAME}/\" + window.location.search + window.location.hash);</script></head><body>Redirecting to /${REPO_NAME}/...</body></html>" > redirect/index.html
            docker exec $CENTRAL_CONTAINER mkdir -p /usr/share/nginx/html/$ORIGINAL_REPO_NAME
            docker cp redirect/index.html $CENTRAL_CONTAINER:/usr/share/nginx/html/$ORIGINAL_REPO_NAME/index.html
          fi
          
          echo "🚀 Sucesso Absoluto! Disponível em: http://10.0.0.88:3005/$REPO_NAME/ (ou http://10.0.0.88:3005/$ORIGINAL_REPO_NAME/)"
