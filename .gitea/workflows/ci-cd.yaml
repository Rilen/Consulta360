name: Deploy Homologação Automático 1

on: [push]

jobs:
  deploy-homologacao:
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine
      networkMode: host
    
    steps:
      - name: Checkout do Código via Git Puro
        shell: sh
        run: |
          apk add --no-cache git ca-certificates
          git clone http://x-access-token:${{ gitea.token }}@10.0.0.88:3001/${{ gitea.repository }}.git .
          git checkout ${{ gitea.sha }}
        
      - name: Instalar Dependências e Cliente Docker
        run: |
          apk add --no-cache docker-cli
          npm install
          
      - name: Compilar Produção Estática
        # AQUI A MÁGICA DO NEXT_PUBLIC_ ACONTECE:
        env:
          NEXT_PUBLIC_API_URL: http://10.0.0.88:3000 # <-- Ajuste a porta se o seu backend não for a 3000
        run: |
          npm run build
          
      - name: Injetar Arquivos Direto no Nginx Central via Docker
        run: |
          REPO_NAME=$(echo "${{ gitea.repository }}" | cut -d'/' -f2 | tr 'A-Z' 'a-z')
          ORIGINAL_REPO_NAME=$(echo "${{ gitea.repository }}" | cut -d'/' -f2)
          
          echo "🐳 Injetando build estático dentro do container central nginx-homologacao..."
          docker exec nginx-homologacao mkdir -p /usr/share/nginx/html/$REPO_NAME
          docker exec nginx-homologacao sh -c "rm -rf /usr/share/nginx/html/$REPO_NAME/*"
          docker cp out/. nginx-homologacao:/usr/share/nginx/html/$REPO_NAME/
          
          if [ "$ORIGINAL_REPO_NAME" != "$REPO_NAME" ]; then
            echo "🔄 Criando página de redirecionamento para o caso original ($ORIGINAL_REPO_NAME -> $REPO_NAME)..."
            mkdir -p redirect
            echo "<html><head><meta http-equiv=\"refresh\" content=\"0;url=/${REPO_NAME}/\" /><script>window.location.replace(\"/${REPO_NAME}/\" + window.location.search + window.location.hash);</script></head><body>Redirecting to /${REPO_NAME}/...</body></html>" > redirect/index.html
            docker exec nginx-homologacao mkdir -p /usr/share/nginx/html/$ORIGINAL_REPO_NAME
            docker cp redirect/index.html nginx-homologacao:/usr/share/nginx/html/$ORIGINAL_REPO_NAME/index.html
          fi
          
          echo "🚀 Sucesso Absoluto! Disponível em: http://10.0.0.88:3005/$REPO_NAME/ (ou http://10.0.0.88:3005/$ORIGINAL_REPO_NAME/)"
