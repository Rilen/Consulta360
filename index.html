<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta360 - SPA</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('Service Worker Registrado!', reg))
          .catch(err => console.error('Falha no Service Worker', err));
      });
    }
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico">

  <!-- Tailwind CSS gerado via CLI está linkado no final do head -->
  <script src="./assets/js/theme.js"></script>


  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- html2pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <link rel="stylesheet" href="./assets/css/global.css">
</head>

<body class="text-slate-800 dark:text-white antialiased selection:bg-blue-100 selection:text-blue-900 bg-slate-50 dark:bg-[#0B0F19]">

  <div class="app-container" id="app-root">
    <!-- Sidebar Dinâmica -->
    <div id="sidebar-container"></div>

    <!-- Conteúdo Principal -->
    <main
    class="main-content d-flex flex-column min-vh-100 w-100">
      
      <!-- Status Banner (Controlado por JS) -->
      <div id="status-banner" class="hidden text-slate-800 dark:text-white text-xs font-bold uppercase tracking-widest text-center py-2 shadow-inner">
        <i id="status-banner-icon" class="bi bi-info-circle w-4 h-4 inline-block mr-2 align-text-bottom"></i>
        <span id="status-banner-text"></span>
      </div>

      <!-- Barra Discreta de Sincronização Anual -->
      <div class="w-full bg-blue-50/50 dark:bg-slate-800/50 border-b border-blue-100 dark:border-slate-700 py-2 px-6 flex justify-end items-center gap-3">
        <span class="text-xs text-slate-500 dark:text-slate-400 font-medium">Ano de Exercício:</span>
        <select id="sync-ano-select" class="text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded px-2 py-1 outline-none focus:ring-1 focus:ring-blue-500">
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
        </select>
        <button id="btn-sync-ano" class="text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white rounded px-3 py-1.5 transition-colors shadow-sm flex items-center gap-2">
          <i class="bi bi-arrow-repeat"></i> Sincronizar Ano Inteiro
        </button>
      </div>

      <!-- Corpo Dinâmico (Router injeta aqui) -->
      <div id="app-body" class="mt-8 p-6 max-w-[1600px] mx-auto space-y-6 flex-grow-1 w-full">
        <!-- Conteúdo será carregado dinamicamente via router.js -->
        <div class="flex items-center justify-center h-64">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>
      </div>

      <!-- Footer Dinâmico -->
      <footer id="app-footer" class="mt-8 mb-6 max-w-[1600px] mx-auto px-6 w-full"></footer>
      
    </main>
  </div>

  <!-- Componentes (Framework Layer) -->
  <script src="./components/header/menu.js?v=15"></script>
  <script src="./components/footer/versao.js?v=15"></script>
  <script src="./components/footer/npa.js?v=15"></script>

  <!-- Lógica de Negócio e Roteamento -->
  <script src="./assets/js/db.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/logger.js"></script>
  
  <!-- Módulos de Telas -->
  <script src="./assets/js/home.js"></script>
  <script src="./assets/js/dashboard.js"></script>
  <script src="./assets/js/graficos.js"></script>
  <script src="./assets/js/evolucao.js"></script>
  <script src="./assets/js/diff.js"></script>
  <script src="./assets/js/auditoria.js"></script>
  <script src="./assets/js/receitas.js"></script>
  <script src="./assets/js/despesas.js"></script>
  <script src="./assets/js/contracheque.js"></script>
  <script src="./assets/js/comparacao.js"></script>
  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/logs.js"></script>
  <script src="./assets/js/pdf.js"></script>

  <!-- Lógica Central -->
  <script src="./assets/js/router.js?v=15"></script>
  <script src="./assets/js/layout.js?v=15"></script>

  <!-- Lógica de Negócios Adicional -->
  <script src="./assets/js/autosync.js?v=15"></script>

</body>
</html>
