<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta360 - SPA</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('Service Worker Registrado!', reg))
          .catch(err => console.error('Falha no Service Worker', err));
      });
    }
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico">

  <!-- Tailwind CSS -->
  <script>
    // Silenciar aviso de CDN do Tailwind para mantermos a pipeline puramente estática da prefeitura
    const originalWarn = console.warn;
    console.warn = function(...args) {
      if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
      originalWarn.apply(console, args);
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="./assets/css/global.css">
</head>

<body class="text-slate-800 antialiased selection:bg-blue-100 selection:text-blue-900 flex flex-col min-h-screen">

  <!-- Background Orbs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-400/20 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 -left-20 w-72 h-72 bg-emerald-400/10 rounded-full blur-3xl"></div>
  </div>

  <!-- Header Dinâmico -->
  <header id="app-header" class="sticky top-0 z-50 bg-[#004b80] border-b border-[#003860] shadow-md transition-all"></header>

  <!-- Status Banner (Controlado por JS) -->
  <div id="status-banner" class="hidden text-white text-xs font-bold uppercase tracking-widest text-center py-2 shadow-inner">
    <i id="status-banner-icon" data-lucide="info" class="w-4 h-4 inline-block mr-2 align-text-bottom"></i>
    <span id="status-banner-text"></span>
  </div>

  <!-- Corpo Dinâmico (Router injeta aqui) -->
  <main id="app-body" class="mt-8 p-6 max-w-[1600px] mx-auto space-y-6 flex-1 w-full">
    <!-- Conteúdo será carregado dinamicamente via router.js -->
    <div class="flex items-center justify-center h-64">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
    </div>
  </main>

  <!-- Footer Dinâmico -->
  <footer id="app-footer" class="mt-8 mb-6 max-w-[1600px] mx-auto px-6 w-full"></footer>

  <!-- Componentes (Framework Layer) -->
  <script src="./components/header/logo.js?v=15"></script>
  <script src="./components/header/menu.js?v=15"></script>
  <script src="./components/footer/versao.js?v=15"></script>
  <script src="./components/footer/npa.js?v=15"></script>

  <!-- Lógica Central -->
  <script src="./assets/js/router.js?v=15"></script>
  <script src="./assets/js/layout.js?v=15"></script>

  <!-- Lógica de Negócios / Telas -->
  <script src="./assets/js/db.js?v=15"></script>
  <script src="./assets/js/api.js?v=15"></script>
  <script src="./assets/js/home.js?v=15"></script>
  <script src="./assets/js/evolucao.js?v=15"></script>
  <script src="./assets/js/graficos.js?v=15"></script>
  <script src="./assets/js/auditoria.js?v=15"></script>
  <script src="./assets/js/contracheque.js?v=15"></script>
  <script src="./assets/js/receitas.js?v=15"></script>
  <script src="./assets/js/despesas.js?v=15"></script>
  <script src="./assets/js/comparacao.js?v=15"></script>
  <script src="./assets/js/config.js?v=15"></script>
  <script src="./assets/js/autosync.js?v=15"></script>
  <script src="./assets/js/dashboard.js?v=15"></script>
  <script src="./assets/js/diff.js?v=15"></script>

</body>
</html>
