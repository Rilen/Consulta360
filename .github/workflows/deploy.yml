name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

  # Permite rodar manualmente na aba Actions
  workflow_dispatch:

# Permissões necessárias para que o GitHub Pages funcione
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas 1 deploy ocorra por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Faz o upload de toda a raiz do repositório
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
